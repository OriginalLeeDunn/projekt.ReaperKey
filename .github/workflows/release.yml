name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build multi-platform binaries ────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for aarch64-linux)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} --manifest-path server/Cargo.toml

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} --manifest-path server/Cargo.toml

      - name: Package binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          BINARY_NAME="ghostkey-server"
          TARGET="${{ matrix.target }}"
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-${TARGET}.tar.gz"

          mkdir -p dist
          # Workspace root target dir (not server/target/ — Cargo workspace puts output here)
          cp "target/${TARGET}/release/${BINARY_NAME}" dist/
          cp README.md config.toml.example dist/ 2>/dev/null || true

          cd dist
          tar czf "../${ARCHIVE_NAME}" .
          cd ..

          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
          retention-days: 1

  # ── Publish SDK to npm ────────────────────────────────────────────────────────
  npm-publish:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public || echo "Version already published, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, npm-publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: release-artifacts

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          # Extract the section for this version from CHANGELOG.md
          SECTION=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to file to avoid env var length limits
          echo "$SECTION" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: release-artifacts/**
          fail_on_unmatched_files: true
