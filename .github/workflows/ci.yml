name: CI

on:
  push:
    branches: [main, dev, 'feat/**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust Backend ────────────────────────────────────────────────────────────
  rust:
    name: Rust — lint + test + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test
        env:
          JWT_SECRET: test-secret-minimum-32-characters!!
          BASE_RPC_URL: https://sepolia.base.org
          BASE_BUNDLER_URL: https://test.bundler.example
          BASE_PAYMASTER_URL: https://test.paymaster.example

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit
        run: cargo audit

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Coverage check (70% gate)
        run: cargo tarpaulin --config server/tarpaulin.toml --out Xml --fail-under 70
        env:
          JWT_SECRET: test-secret-minimum-32-characters!!
          BASE_RPC_URL: https://sepolia.base.org
          BASE_BUNDLER_URL: https://test.bundler.example
          BASE_PAYMASTER_URL: https://test.paymaster.example

  # ── TypeScript SDK ──────────────────────────────────────────────────────────
  sdk:
    name: SDK — typecheck + lint + test + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage check (80% gate)
        run: npm run test:coverage

      - name: Dependency audit
        run: npm audit --audit-level high

  # ── Security Gates ──────────────────────────────────────────────────────────
  security:
    name: Security — SPEC-200 through SPEC-203
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2

      - name: Run security tests
        run: cargo test --test security
        env:
          JWT_SECRET: test-secret-minimum-32-characters!!
